<!--
  theme-toggle — single button that flips between light + dark.

  Markup-only. The button text/icon is driven by the `mode` observable
  exported from src/core/theme/themeService.js.
-->
<button
  type="button"
  class="theme-toggle"
  data-bind="click: toggle, attr: { 'aria-label': label, title: label }"
>
  <span class="theme-toggle__icon" data-bind="text: icon"></span>
  <span class="theme-toggle__label" data-bind="text: shortLabel"></span>
</button>
